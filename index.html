<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akre Computer Institute - Attendance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #4CAF50;
            --danger: #ff4444;
            --dark: #2d3748;
            --light: #f7fafc;
            --gray: #a0aec0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Noto Sans Arabic', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--dark);
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .logo-box img {
            height: 110px;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        h3 {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 25px;
            font-weight: 400;
        }

        /* Language Bar Selection */
        .lang-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .lang-btn {
            padding: 6px 12px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            color: #4a5568;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Input Configuration */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }

        body.rtl .form-group {
            text-align: right;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background: var(--light);
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        input.error {
            border-color: var(--danger);
            background: #fff5f5;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Alert Callouts */
        .error-box {
            background: #fff5f5;
            border-left: 4px solid var(--danger);
            padding: 12px;
            border-radius: 8px;
            color: #c53030;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }

        body.rtl .error-box {
            border-left: none;
            border-right: 4px solid var(--danger);
            text-align: right;
        }

        .error-box.show {
            display: block;
            animation: shake 0.4s ease;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102,126,234,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 15px;
        }

        /* Application Form Screen layout */
        .app-screen {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 700px;
            display: none;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .btn-logout {
            padding: 8px 16px;
            background: #edf2f7;
            color: #4a5568;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #e2e8f0;
            color: var(--danger);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        @media(max-width: 480px) {
            .login-container { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginWrapper">
        <div class="loading-overlay" id="loadingView">
            <div class="spinner"></div>
            <p id="loadingText">Fetching sheet accounts...</p>
        </div>

        <div class="logo-box">
            <img src="aci.jpg" alt="Akre Computer Institute Logo" onerror="this.style.display='none'">
        </div>

        <h2 id="lblTitle">Akre Computer Institute</h2>
        <h3 id="lblSubtitle">Attendance System Portal</h3>

        <div class="lang-bar">
            <button class="lang-btn active" onclick="switchLanguage('en')">English</button>
            <button class="lang-btn" onclick="switchLanguage('ku')">كوردی</button>
            <button class="lang-btn" onclick="switchLanguage('ar')">العربية</button>
        </div>

        <div class="error-box" id="loginError">
            <span id="loginErrorText">Incorrect Username or Password!</span>
        </div>

        <div class="form-group">
            <label id="lblUser">Username</label>
            <input type="text" id="loginUsername" placeholder="e.g., abdulbari">
        </div>

        <div class="form-group">
            <label id="lblPass">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>

        <button class="btn-submit" id="lblBtnLogin" onclick="doLogin()">Log In</button>
    </div>

    <div class="app-screen" id="appWrapper">
        <div class="app-header">
            <div>
                <h2 id="welcomeTeacher" style="margin:0; color:var(--dark);">Welcome, Teacher</h2>
                <p id="teacherSub text" style="color:#718096; font-size:0.9rem; margin-top:3px;">Please complete the daily submission roster.</p>
            </div>
            <button class="btn-logout" id="lblLogout" onclick="doLogout()">Sign Out</button>
        </div>
        
        <div style="text-align:center; padding: 40px 0; color:#4a5568;">
            <p style="font-size:1.1rem; font-weight:500;">Teacher Attendance Registration checklist form context.</p>
            <p style="font-size:0.9rem; color:var(--gray); margin-top:10px;">Connected with active session tokens securely.</p>
        </div>
    </div>

    <script>
        // Google Web App Endpoint Macro Config
        const API_URL = 'https://script.google.com/macros/s/AKfycbx1Qvcn36WEvHrjivpd-ClArM3LNGPMQIWYxocBqzhkZzMHojNJSCPFxvqiEL91SuEV/exec?api=data';
        
        let TEACHERS = [];
        let currentTeacher = null;
        let currentLang = 'en';

        // Localized Translations dictionary UI engine Map
        const LANGS = {
            en: {
                title: "Akre Computer Institute",
                subtitle: "Attendance System Portal",
                user: "Username",
                pass: "Password",
                loginBtn: "Log In",
                logoutBtn: "Sign Out",
                loadingData: "Fetching sheet accounts...",
                errFill: "Please fill out both username and password fields!",
                errWrong: "Incorrect Username or Password!",
                welcome: "Welcome, ",
                dir: "ltr",
                bodyClass: ""
            },
            ku: {
                title: "پەیمانگەها کومپیوتەرێ ل ئاکرێ",
                subtitle: "پۆرتالا سیستەمێ نەهاتنێ",
                user: "ناڤێ بەکارهێنەری (Username)",
                pass: "وشەی تێپەڕ (Password)",
                loginBtn: "چوونە ژوورەوە",
                logoutBtn: "چوونە دەرەوە",
                loadingData: "بارکرنا ئەکاونتێن مامۆستایان...",
                errFill: "تکایە هەم ناڤی بەکارهێنەر و هەم وشەی تێپەڕ پڕ بکەرەوە!",
                errWrong: "ناڤی بەکارهێنەر یان وشەی تێپەڕ هەڵەیە!",
                welcome: "بخێر بێی، ",
                dir: "rtl",
                bodyClass: "rtl"
            },
            ar: {
                title: "معهد عقرة للحاسوب",
                subtitle: "بوابة نظام الغيابات والدوام",
                user: "اسم المستخدم",
                pass: "كلمة المرور",
                loginBtn: "تسجيل الدخول",
                logoutBtn: "تسجيل الخروج",
                loadingData: "جاري جلب حسابات الأساتذة...",
                errFill: "يرجى ملء حقول اسم المستخدم وكلمة المرور معاً!",
                errWrong: "اسم المستخدم أو كلمة المرور غير صحيحة!",
                welcome: "مرحباً، أستاذ ",
                dir: "rtl",
                bodyClass: "rtl"
            }
        };

        // Initialize App Database on load
        document.addEventListener('DOMContentLoaded', function() {
            fetchTeachersDatabase();
        });

        // Pull dynamic real-time credential pairs from Google Sheets
        async function fetchTeachersDatabase() {
            showLoading(true, LANGS[currentLang].loadingData);
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Network response error");
                const json = await response.json();
                
                if (json && json.values && json.values.length > 1) {
                    const headers = json.values[0];
                    // Mapping rows dynamically to keys
                    TEACHERS = json.values.slice(1).map(row => {
                        let obj = {};
                        headers.forEach((h, i) => {
                            // Clean up spacing headers
                            let key = h.trim().replace('teachers-', '');
                            obj[key] = row[i] ? row[i].toString().trim() : '';
                        });
                        return obj;
                    }).filter(t => t.username);
                    
                    console.log(`🚀 Loaded ${TEACHERS.length} authenticated accounts from Google Sheets.`);
                    
                    // Fire up the session auto-login verification gate
                    checkAutoLogin();
                }
            } catch (err) {
                console.error("Failed to load spreadsheet database:", err);
                // Fallback local backup block if sheet connection fails offline
                TEACHERS = [{ username: "admin", password: "admin1234", displayName: "Admin Dashboard" }];
                checkAutoLogin();
            } finally {
                showLoading(false);
            }
        }

        // Multi-Language Switch Render Engine
        function switchLanguage(lang) {
            currentLang = lang;
            
            // Set styles and language configuration variables
            if (LANGS[lang].dir === 'rtl') {
                document.body.classList.add('rtl');
            } else {
                document.body.classList.remove('rtl');
            }

            // Update DOM text translations
            document.getElementById('lblTitle').textContent = LANGS[lang].title;
            document.getElementById('lblSubtitle').textContent = LANGS[lang].subtitle;
            document.getElementById('lblUser').textContent = LANGS[lang].user;
            document.getElementById('lblPass').textContent = LANGS[lang].pass;
            document.getElementById('lblBtnLogin').textContent = LANGS[lang].loginBtn;
            document.getElementById('lblLogout').textContent = LANGS[lang].logoutBtn;

            // Highlight chosen button tab
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.textContent.toLowerCase().includes(lang) || (lang==='ku' && btn.textContent==='كوردی') || (lang==='ar' && btn.textContent==='العربية')) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Unified Smart Routing Logic Engine
        function doLogin() {
            const uInput = document.getElementById('loginUsername');
            const pInput = document.getElementById('loginPassword');
            const u = uInput.value.trim().toLowerCase();
            const p = pInput.value.trim();
            
            const errBox = document.getElementById('loginError');
            const errText = document.getElementById('loginErrorText');

            // Reset UI errors
            uInput.classList.remove('error');
            pInput.classList.remove('error');
            errBox.classList.remove('show');

            if (!u || !p) {
                errText.textContent = LANGS[currentLang].errFill;
                errBox.classList.add('show');
                if(!u) uInput.classList.add('error');
                if(!p) pInput.classList.add('error');
                return;
            }

            // 1. ROUTING CHECK: Is it the Admin account?
            if (u === 'admin') {
                const adminAccount = TEACHERS.find(t => t.username === 'admin' && t.password === p);
                if (adminAccount) {
                    // Lock-in session storage tokens
                    localStorage.setItem('remembered_username', u);
                    localStorage.setItem('remembered_password', p);
                    
                    // 🚀 Redirect immediately to Admin Dashboard page
                    window.location.href = 'absentapi.html';
                    return;
                }
            }

            // 2. ROUTING CHECK: Regular Teacher account matching logic
            const teacherMatch = TEACHERS.find(t => t.username === u && t.password === p);
            
            if (!teacherMatch) {
                errText.textContent = LANGS[currentLang].errWrong;
                errBox.classList.add('show');
                uInput.classList.add('error');
                pInput.classList.add('error');
                return;
            }

            // Valid Session Context Identified
            currentTeacher = teacherMatch;
            localStorage.setItem('remembered_username', u);
            localStorage.setItem('remembered_password', p);
            
            showSubmitScreen();
        }

        // Auto-Login Verification Gatekeeper Hook
        function checkAutoLogin() {
            const savedUser = localStorage.getItem('remembered_username');
            const savedPass = localStorage.getItem('remembered_password');

            if (savedUser && savedPass && TEACHERS.length > 0) {
                // If it was the admin, redirect straight back to dashboard
                if (savedUser === 'admin') {
                    const adminAccount = TEACHERS.find(t => t.username === 'admin' && t.password === savedPass);
                    if (adminAccount) {
                        window.location.href = 'absentapi.html';
                        return;
                    }
                }

                // If regular teacher, restore dashboard environment state directly
                const teacherMatch = TEACHERS.find(t => t.username === savedUser && t.password === savedPass);
                if (teacherMatch) {
                    currentTeacher = teacherMatch;
                    showSubmitScreen();
                }
            }
        }

        // Show Checklist Panel UI Layer
        function showSubmitScreen() {
            document.getElementById('loginWrapper').style.display = 'none';
            document.getElementById('appWrapper').style.display = 'block';
            
            const displayTitle = currentTeacher.displayName || currentTeacher.username;
            document.getElementById('welcomeTeacher').textContent = `${LANGS[currentLang].welcome} ${displayTitle}`;
        }

        // Terminate Token Sessions and Sign Out
        function doLogout() {
            localStorage.removeItem('remembered_username');
            localStorage.removeItem('remembered_password');
            currentTeacher = null;
            
            // Clean inputs and reset screens
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('appWrapper').style.display = 'none';
            document.getElementById('loginWrapper').style.display = 'block';
        }

        // Loading Overlay Utility
        function showLoading(status, message = "") {
            const overlay = document.getElementById('loadingView');
            if (status) {
                if (message) document.getElementById('loadingText').textContent = message;
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>
